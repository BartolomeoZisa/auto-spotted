name: Spotted Bot Automation

on:
  schedule:
    # Esegue lo script ogni 6 ore
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permette di avviare il bot manualmente con un pulsante su GitHub

permissions:
  contents: write # Permesso necessario per salvare e fare il push dell'immagine generata

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Crea credentials.json dal secret
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > credentials.json

      - name: Esegui Bot Python
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IMAGE_URL: ${{ secrets.IMAGE_URL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_FILE: "credentials.json"
        run: python main.py

      - name: Commit e Push dell'immagine generata
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_post.jpg || true
          git commit -m "Auto-generated latest post image" || exit 0
          git push